<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>c-flat · real raylib · wasm</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 12px;
        padding: 24px;
        background: #14141e;
        color: #e6e6ee;
        font: 14px/1.5 system-ui, sans-serif;
      }
      canvas {
        border: 1px solid #333;
        background: #000;
      }
      #log {
        width: 640px;
        min-height: 1.5em;
        white-space: pre-wrap;
        font-family: monospace;
        color: #9ecbff;
      }
      .err {
        color: #ff6b6b;
      }
    </style>
  </head>
  <body>
    <h1>c-flat · real raylib · wasm</h1>
    <!-- emscripten/raylib render target -->
    <canvas id="canvas" width="640" height="480" oncontextmenu="event.preventDefault()" tabindex="-1"></canvas>
    <div id="log"></div>

    <script type="module">
      // The c-flat program (asyncified) drives a normal main()+while loop; its
      // `core` raylib imports are forwarded to the REAL raylib (emscripten) via
      // the bridge. At end_drawing() we flush raylib's GL frame, then unwind the
      // c-flat stack to yield to the browser, resuming on the next rAF.
      import { makeRaylibHost } from "./raylib_host_bridge.js";

      const WASM_URL = "./__WASM_FILE__";
      const DATA_ADDR = 0x30000; // 192 KB — above the c-flat program's data
      const STACK_SIZE = 0x8000; // 32 KB asyncify unwind buffer

      const logEl = document.getElementById("log");
      const canvas = document.getElementById("canvas");
      globalThis.__cflat_log = (s) => (logEl.textContent += s);
      const fail = (msg) => {
        logEl.innerHTML += `<span class="err">${msg}</span>\n`;
        console.error(msg);
      };

      let instance = null;
      let exports = null;
      let sleeping = false;

      const host = makeRaylibHost(() => instance.exports.memory, canvas);
      const { core } = host;

      // Wrap EndDrawing: flush the real GL frame, then unwind to yield. On the
      // next animation frame we rewind back here and continue the loop.
      const realEndDrawing = core.EndDrawing;
      core.EndDrawing = () => {
        if (!sleeping) {
          realEndDrawing(); // Module._EndDrawing() — present the GL frame
          exports.asyncify_start_unwind(DATA_ADDR);
          sleeping = true;
        } else {
          exports.asyncify_stop_rewind();
          sleeping = false;
        }
      };

      function run() {
        exports.main();
        if (exports.asyncify_get_state() === 1) {
          exports.asyncify_stop_unwind();
          requestAnimationFrame(() => {
            exports.asyncify_start_rewind(DATA_ADDR);
            run();
          });
        }
      }

      async function main() {
        try {
          await host.ready; // real raylib module up, canvas wired to WebGL
        } catch (e) {
          return fail("Failed to init raylib host: " + e);
        }

        let res;
        try {
          const bytes = await (await fetch(WASM_URL)).arrayBuffer();
          res = await WebAssembly.instantiate(bytes, { core });
        } catch (e) {
          return fail("Failed to load/instantiate c-flat wasm: " + e);
        }
        instance = res.instance;
        exports = instance.exports;

        for (const fn of ["main", "asyncify_start_unwind", "asyncify_stop_unwind", "asyncify_start_rewind", "asyncify_stop_rewind", "asyncify_get_state"]) {
          if (typeof exports[fn] !== "function") {
            return fail(`c-flat wasm missing export ${fn} — was it built with wasm-opt --asyncify?`);
          }
        }

        const view = new Int32Array(exports.memory.buffer);
        view[DATA_ADDR >> 2] = DATA_ADDR + 8;
        view[(DATA_ADDR + 4) >> 2] = DATA_ADDR + 8 + STACK_SIZE;

        try {
          run();
        } catch (e) {
          fail("Trap while running main(): " + e);
        }
      }

      main();
    </script>
  </body>
</html>
